name: Deploy to IIS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy files to IIS
        shell: powershell
        run: |
          $source = "${{ github.workspace }}"
          $destination = "C:\inetpub\wwwroot"

          Write-Host "Source: $source"
          Write-Host "Destination: $destination"

          Copy-Item "$source\*" $destination -Recurse -Force