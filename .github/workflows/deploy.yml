name: Deploy to IIS

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: website
          path: .

  deploy:
    needs: build
    runs-on: self-hosted

    environment:
      name: Production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: website
          path: website

      - name: Deploy to IIS
        shell: pwsh
        run: |
          Copy-Item "website\*" "C:\inetpub\wwwroot" -Recurse -Force

      - name: Verify Deployment
        shell: pwsh
        run: |
          Get-ChildItem "C:\inetpub\wwwroot" -Recurse