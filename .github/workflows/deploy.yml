name: Deploy to IIS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stop IIS Website
        shell: powershell
        run: |
          Import-Module WebAdministration
          Stop-Website -Name "Default Web Site"

      - name: Copy Files
        shell: powershell
        run: |
          Copy-Item "${{ github.workspace }}\*" "C:\inetpub\wwwroot\" -Recurse -Force

      - name: Start IIS Website
        shell: powershell
        run: |
          Import-Module WebAdministration
          Start-Website -Name "Default Web Site"