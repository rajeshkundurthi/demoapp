name: Deploy to IIS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on:
      - self-hosted
      - Windows
      - X64
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Workspace
        shell: powershell
        run: |
          Write-Host "Workspace: $env:GITHUB_WORKSPACE"
          Get-ChildItem $env:GITHUB_WORKSPACE -Recurse

      - name: Verify index.html exists
        shell: pwsh
        run: |
          if (Test-Path "$env:GITHUB_WORKSPACE\index.html") {
            Write-Host "index.html found."
          } else {
            Write-Error "index.html not found in repository!"
            exit 1
          }

      - name: Stop IIS Website
        shell: powershell
        run: |
          Import-Module WebAdministration
          Stop-Website -Name "Default Web Site"

      - name: Copy Files to IIS
        shell: powershell
        run: |
          $source = $env:GITHUB_WORKSPACE
          $destination = "C:\inetpub\wwwroot"

          Write-Host "Source: $source"
          Write-Host "Destination: $destination"

          Copy-Item "$source\*" "$destination" -Recurse -Force -Verbose

      - name: Start IIS Website
        shell: powershell
        run: |
          Import-Module WebAdministration
          Start-Website -Name "Default Web Site"

      - name: Verify Deployment
        shell: powershell
        run: |
          Get-ChildItem "C:\inetpub\wwwroot"